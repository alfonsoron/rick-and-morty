<div class="p-3" style="background-color:rgb(31, 31, 31)">
  <div class="row">
    <div class="mb-3">

      <style>
        .dark-input::placeholder {
          color: #bfbfbf;
        }
      </style>

      <input type="text" class="form-control bg-dark text-light border-secondary dark-input w-25"
        placeholder="Buscar personaje" (input)="onSearch(($event.target).value)" />
    </div>

    @for (item of characters(); track item) {

    <div class="col-6 col-md-4 col-lg-3 mb-4" (click)="goToDetail(item)">
      <div class="card h-100 bg-dark text-light shadow-sm">

        <div class="d-flex justify-content-center align-items-center py-3">
          <a class="img-wrapper-btn">
            <img [src]="item.image" class="img-fluid rounded" />
          </a>
        </div>

        <div class="card-body text-center py-2">
          <h6 class="card-title mb-0">
            {{ item.name }}
          </h6>
        </div>

      </div>
    </div>

    }

  </div>
</div>

<app-paginador [currentPage]="currentPage()"
[prevNullPage]="prevNullPage()"
[nextNullPage]="nextNullPage()"
[totalPages]="totalPages()"
(pageChange)="loadCharacters($event)"
></app-paginador>
